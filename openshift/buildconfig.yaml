apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: testapp
  labels:
    app: testapp
    app.kubernetes.io/name: testapp
spec:
  output:
    to:
      kind: ImageStreamTag
      name: testapp:latest
  source:
    type: Git
    git:
      uri: https://github.com/robibanogon/testapp.git
      ref: main
    contextDir: .
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  triggers:
  - type: ConfigChange
  - type: ImageChange
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: testapp
  labels:
    app: testapp
    app.kubernetes.io/name: testapp
spec:
  lookupPolicy:
    local: false

