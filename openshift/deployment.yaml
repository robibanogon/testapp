apiVersion: apps/v1
kind: Deployment
metadata:
  name: gadget-store
  labels:
    app: gadget-store
    app.kubernetes.io/name: gadget-store
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gadget-store
  template:
    metadata:
      labels:
        app: gadget-store
    spec:
      containers:
      - name: gadget-store
        image: gadget-store:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "8080"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: gadget-store-db-secret
              key: host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: gadget-store-db-secret
              key: port
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: gadget-store-db-secret
              key: database
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: gadget-store-db-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: gadget-store-db-secret
              key: password
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/products
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/products
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault

